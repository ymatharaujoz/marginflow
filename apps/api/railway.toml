[build]
builder = "nixpacks"
buildCommand = "corepack enable && corepack pnpm install --frozen-lockfile && corepack pnpm --filter @marginflow/api build"

[deploy]
startCommand = "corepack pnpm --filter @marginflow/api start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
